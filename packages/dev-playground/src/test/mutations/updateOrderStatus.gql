mutation updateOrderStatus($id: String!, $status: OrderStatusEnum!) {
  updateOrderStatus(id: $id, status: $status, someOtherInput: { status: $status }) {
    message {
      type
      text
    }
    order {
      id
      status

      items {
        count
        items {
          product {
            name
          }
        }
      }
    }
  }
}
