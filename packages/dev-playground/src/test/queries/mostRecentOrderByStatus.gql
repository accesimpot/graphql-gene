query mostRecentOrderByStatus($status: String!) {
  order(where: { status: { eq: $status } }, order: [updatedAt_DESC]) {
    id
    status
    updatedAt
    fieldAddedWithExtendTypes(prefix: "status", separator: ": ")

    items {
      items {
        id
        price
        quantity
        product {
          name
          color

          group {
            products {
              items {
                id
              }
            }
            categories
          }
        }
      }
    }
  }
}
