query orderById($id: String!) {
  order(id: $id) {
    id
    status

    items {
      items {
        price
        quantity
        product {
          id
          name
          color

          group {
            categories
          }

          variants {
            items {
              size
            }
          }

          reviewAverage {
            rating
            total
          }
        }
      }
    }
  }
}
